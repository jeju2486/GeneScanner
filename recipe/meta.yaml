package:
  name: genescanner
  version: 1.0.0

source:
  path: ..

build:
  number: 0
  noarch: python

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools
  run:
    - python >=3.10
    - biopython >=1.81
    - numpy >=1.23
    - pandas >=1.5
    - xlsxwriter >=3.0
    - matplotlib >=3.10
    - seaborn >=0.13
    - openpyxl
  run_constrained:
    - mafft >=7.526
    - snp-sites >=2.4.0

test:
  commands:
    - GeneScanner --help
    - GeneScanner-viewer --help
    - python -c "import GeneScanner"

about:
  home: https://github.com/jeju2486/GeneScanner
  summary: Mutation analysis on nucleotide/protein alignments with Excel reports
  description: >-
    GeneScanner is a high-throughput mutation analysis tool for aligned
    nucleotide/protein FASTA data that generates mutation summaries and
    multi-sheet Excel reports.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/jeju2486/GeneScanner
  doc_url: https://github.com/jeju2486/GeneScanner/wiki/GeneScanner

extra:
  recipe-maintainers:
    - broncio
